name: Weekly Magazine Articles

on:
  schedule:
    # 月・水・金 AM9:00 JST (前日 24:00 UTC)
    - cron: '0 0 * * 1,3,5'
  workflow_dispatch:
    inputs:
      count:
        description: 'Number of articles to generate'
        default: '1'
        type: string

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Generate articles
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node magazine/generate-articles.js ${{ inputs.count || '1' }}

      - name: Build magazine (with images)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node magazine/build.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add magazine/posts/ magazine/*.html magazine/*.json magazine/*.css assets/images/magazine/
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          ARTICLE_COUNT=$(git diff --staged --name-only -- magazine/posts/*.md | wc -l | tr -d ' ')
          git commit -m "feat: publish ${ARTICLE_COUNT} new magazine articles (auto-generated)"
          git push
